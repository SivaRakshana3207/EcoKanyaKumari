<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoKanyaKumari | AI Travel Startup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='plan.css') }}">
</head>
<body class="bg-dark text-light">

    <div class="container py-4">
        <header class="text-center mb-4">
            <h1 class="display-5 fw-bold text-warning animate__animated animate__fadeInDown">EcoKanyaKumari</h1>
            <p class="text-secondary">Personalized AI Journey Planner</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-7">
                <div id="messages" class="shadow-lg border border-secondary mb-3 p-3">
                    <div class="message bot animate__animated animate__fadeInUp">
                        👋 Welcome! Let's plan your Kanyakumari trip. <br>
                        <b>Where are you traveling from?</b>
                    </div>
                </div>

                <div class="input-group mb-5">
                    <input type="text" id="userInput" class="form-control bg-secondary text-white border-0" 
                        placeholder="Type your origin (e.g. Delhi or Nagercoil)..." 
                        onkeypress="if(event.key === 'Enter') handleInput()">
                    <button class="btn btn-warning fw-bold" type="button" onclick="handleInput()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='plan.js') }}"></script>
</body>
</html>
